<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1f7a5c" />
    <title>Rapor GQ Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f6f2;
        color: #1e2520;
        font-family: Arial, Helvetica, sans-serif;
      }
      main {
        width: min(88vw, 420px);
        border: 1px solid #d8ded5;
        border-radius: 8px;
        background: #ffffff;
        padding: 24px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }
      p {
        margin: 0;
        color: #68736c;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Mode offline</h1>
      <p>Koneksi internet belum tersedia. Sambungkan kembali internet untuk membuka data terbaru dari Supabase.</p>
    </main>
  </body>
</html>
